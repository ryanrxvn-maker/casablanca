<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DARKO LAB · Freepik Sync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <span class="dot" id="dot"></span>
        <strong>DARKO LAB</strong> · Freepik Sync
      </div>
    </header>

    <div class="status" id="status">
      <div class="title" id="statusTitle">Verificando…</div>
      <div class="sub" id="statusSub"></div>
    </div>

    <div class="meta" id="meta" hidden>
      <div><span>Plano:</span> <strong id="metaPlan">—</strong></div>
      <div><span>User Magnific:</span> <strong id="metaUid">—</strong></div>
      <div><span>Último sync:</span> <strong id="metaLast">—</strong></div>
    </div>

    <div class="actions">
      <button id="btnSync" class="primary">Sincronizar agora</button>
      <button id="btnOpenMagnific" class="ghost">Abrir magnific.com</button>
      <button id="btnOpenDarko" class="ghost">Abrir DARKO LAB</button>
    </div>

    <details class="advanced">
      <summary>Avançado</summary>
      <label>
        Endpoint DARKO LAB
        <input id="endpoint" type="url" placeholder="https://www.darkolab.com">
      </label>
      <button id="btnSaveEndpoint" class="ghost small">Salvar endpoint</button>
    </details>

    <footer>v1.0.0 · Auto-sync a cada 30min + on cookie change</footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
