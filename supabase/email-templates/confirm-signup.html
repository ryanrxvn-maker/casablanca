<!--
  Auto Edit — template "Confirm signup" (código de 6 dígitos).
  Cole em: Supabase Dashboard -> Authentication -> Email Templates -> Confirm signup.
  IMPORTANTE: usa {{ .Token }} (código) — NÃO use {{ .ConfirmationURL }} aqui,
  senão o Supabase manda link mágico em vez do código.

  O logo aponta pra URL absoluta (email não acessa arquivos locais). Troque
  pela URL do domínio quando registrar (ex: https://autoedit.com/auto-edit-logo@256.png).
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#08080b;margin:0;padding:32px 0;font-family:'Segoe UI',Helvetica,Arial,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:linear-gradient(180deg,#15151a,#0b0b0e);border:1px solid rgba(167,139,250,0.25);border-radius:20px;overflow:hidden;">
        <!-- Header / logo -->
        <tr>
          <td align="center" style="padding:36px 32px 8px 32px;">
            <img src="https://casablanca-ashen.vercel.app/auto-edit-logo@256.png" width="64" height="64" alt="Auto Edit" style="display:block;border:0;filter:drop-shadow(0 0 14px rgba(167,139,250,0.7));" />
            <div style="margin-top:14px;font-size:13px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#c084fc;">
              AUTO&nbsp;EDIT
            </div>
          </td>
        </tr>
        <!-- Título -->
        <tr>
          <td align="center" style="padding:18px 36px 0 36px;">
            <h1 style="margin:0;font-size:24px;font-weight:800;color:#ffffff;letter-spacing:-0.5px;">
              Confirme seu email
            </h1>
            <p style="margin:10px 0 0 0;font-size:14px;line-height:1.6;color:#9c9ca6;">
              Use o código abaixo pra ativar sua conta. Ele expira em alguns minutos.
            </p>
          </td>
        </tr>
        <!-- Código -->
        <tr>
          <td align="center" style="padding:28px 36px;">
            <div style="display:inline-block;padding:18px 28px;border-radius:16px;background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.35);">
              <span style="font-size:38px;font-weight:800;letter-spacing:12px;color:#d8b4fe;font-family:'Courier New',monospace;">
                {{ .Token }}
              </span>
            </div>
          </td>
        </tr>
        <!-- Aviso -->
        <tr>
          <td align="center" style="padding:0 36px 8px 36px;">
            <p style="margin:0;font-size:12.5px;line-height:1.6;color:#6b6b75;">
              Se você não criou uma conta na Auto Edit, pode ignorar este email com segurança.
            </p>
          </td>
        </tr>
        <!-- Divisor -->
        <tr>
          <td style="padding:24px 36px 0 36px;">
            <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
          </td>
        </tr>
        <!-- Footer -->
        <tr>
          <td align="center" style="padding:18px 36px 32px 36px;">
            <p style="margin:0;font-size:11px;color:#5a5a64;letter-spacing:1px;text-transform:uppercase;">
              Auto Edit · O estúdio trabalha enquanto você dorme
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
